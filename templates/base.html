<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Laudos Ipergs{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
        .section-card {
            border-left: 4px solid #0d6efd;
            margin-bottom: 1.5rem;
        }
        .section-card .card-header {
            background-color: #e8f0fe;
            font-weight: 600;
            color: #0d3c8a;
            border-bottom: 1px solid #c9d8fb;
        }
        .form-label { font-weight: 500; font-size: 0.9rem; }
        .required-star { color: #dc3545; }
        .btn-gerar {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            border: none;
            font-size: 1.1rem;
            padding: 0.75rem 2.5rem;
            border-radius: 8px;
        }
        .btn-gerar:hover { background: linear-gradient(135deg, #0a58ca, #084298); }
        .form-check-label { font-size: 0.875rem; }
        .sub-card {
            background: #f8f9fc;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }
        .badge-section {
            background: #0d6efd;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-right: 8px;
        }
        .home-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .home-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-file-earmark-medical me-2"></i>Laudos Ipergs
        </a>
        <span class="text-white-50 small">Dr. Fábio Batistella — Reumatologia</span>
    </div>
</nav>

<div class="container pb-5">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
