{% extends "base.html" %}
{% block title %}Termo de Consentimento — AP{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="/" class="btn btn-outline-secondary btn-sm me-3"><i class="bi bi-arrow-left"></i></a>
    <div>
        <span class="badge bg-warning text-dark me-2">AP</span>
        <h4 class="d-inline fw-bold">Termo de Consentimento — Artrite Psoriásica</h4>
    </div>
</div>

<form method="POST" action="/tc/ap">

    <div class="card section-card shadow-sm">
        <div class="card-header">Dados do Paciente</div>
        <div class="card-body row g-3">
            <div class="col-md-6">
                <label class="form-label">Nome completo <span class="required-star">*</span></label>
                <input type="text" name="nome_paciente" class="form-control" required placeholder="Nome do paciente">
            </div>
            <div class="col-md-2">
                <label class="form-label">Idade</label>
                <input type="text" name="idade" class="form-control" placeholder="Ex: 45 anos">
            </div>
            <div class="col-md-2">
                <label class="form-label">Sexo</label>
                <select name="sexo" class="form-select">
                    <option value="Feminino">Feminino</option>
                    <option value="Masculino">Masculino</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">CID-10</label>
                <input type="text" name="cid10" class="form-control" list="cid_list" placeholder="M07.3">
                <datalist id="cid_list">{% for c in cids %}<option value="{{ c }}">{% endfor %}</datalist>
            </div>
            <div class="col-md-3">
                <label class="form-label">Data</label>
                <input type="text" name="data" class="form-control" value="{{ today }}">
            </div>
        </div>
    </div>

    <div class="card section-card shadow-sm">
        <div class="card-header">Medicamento Autorizado <span class="required-star">*</span></div>
        <div class="card-body">
            <div class="row g-2">
                {% for f in farmacos %}
                <div class="col-md-4">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="farmaco" value="{{ f }}" id="f_{{ loop.index }}" required>
                        <label class="form-check-label" for="f_{{ loop.index }}">{{ f }}</label>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <button type="submit" class="btn btn-warning btn-gerar text-dark">
            <i class="bi bi-printer me-2"></i>Gerar Termo para Impressão
        </button>
    </div>
</form>
{% endblock %}
